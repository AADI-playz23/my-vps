name: AbsoraCloud-Auto
on:
  repository_dispatch:
    types: [run-code]

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-latest
    env:
      VPS_PLAN:    ${{ github.event.client_payload.plan }}
      VPS_CPU:     ${{ github.event.client_payload.cpu_cores }}
      VPS_RAM:     ${{ github.event.client_payload.ram_mb }}
      VPS_SESSION: ${{ github.event.client_payload.session_secs }}
      VPS_FM:      ${{ github.event.client_payload.file_manager }}
      VPS_STORAGE: ${{ github.event.client_payload.storage_mb }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup & Tunnel
        run: |
          echo "Plan    : $VPS_PLAN"
          echo "CPU     : $VPS_CPU cores"
          echo "RAM     : $VPS_RAM MB"
          echo "Session : $VPS_SESSION s"
          echo "FM      : $VPS_FM"
          echo "Storage : $VPS_STORAGE MB"

          # ── 1. Python deps ────────────────────────────────────────
          pip install websockets psutil --quiet

          # ── 2. Cloudflare tunnel ──────────────────────────────────
          curl -sL --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

          # ── 3. Apply plan resource limits via cgroups ─────────────
          # Limit RAM using systemd-run if available
          RAM_BYTES=$(( VPS_RAM * 1024 * 1024 ))
          echo "Applying RAM limit: ${VPS_RAM}MB"
          # We use ulimit for a best-effort cap (GitHub Actions doesn't allow cgroup writes)
          ulimit -v $(( VPS_RAM * 1024 )) 2>/dev/null || true

          # ── 4. Start WebSocket terminal server ────────────────────
          python3 server.py &

          echo "Waiting for WS server on :5000..."
          for i in $(seq 1 20); do
            nc -z localhost 5000 2>/dev/null && echo "Server ready!" && break
            sleep 1
          done

          # ── 5. Cloudflare tunnel ──────────────────────────────────
          cloudflared tunnel --url http://localhost:5000 > /tmp/tunnel.log 2>&1 &

          echo "Waiting for tunnel URL..."
          sleep 10

          TUNNEL_URL=$(grep -o 'https://[-0-9a-z]*\.trycloudflare.com' /tmp/tunnel.log | head -1)
          echo "Tunnel URL: $TUNNEL_URL"

          # ── 6. Save URL to repo ───────────────────────────────────
          SESSION_ID="${{ github.event.client_payload.session_id }}"

          git config --global user.name  "AbsoraCloud-Bot"
          git config --global user.email "bot@absoracloud.local"

          mkdir -p sessions
          echo "$TUNNEL_URL" > sessions/$SESSION_ID

          git pull
          git add sessions/$SESSION_ID
          git commit -m "Session: $SESSION_ID [$VPS_PLAN]"
          git push

          echo "Session live: $TUNNEL_URL"

          # ── 7. Keep alive for session duration ────────────────────
          sleep $VPS_SESSION
