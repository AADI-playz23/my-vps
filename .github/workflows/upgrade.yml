name: Absora Auto-Upgrade

on:
  repository_dispatch:
    types: [manual_upgrade]

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Storage
        uses: actions/checkout@v4
        with:
          repository: YOUR_GITHUB_USERNAME/vps-storage
          token: ${{ secrets.STORAGE_PAT }}
          path: storage_repo

      - name: Add User to Pro Database
        run: |
          cd storage_repo
          USER_NAME="${{ github.event.client_payload.username }}"
          UTR_CODE="${{ github.event.client_payload.utr }}"
          
          # Check if UTR was already used to prevent double-upgrades
          if grep -q "$UTR_CODE" pro_users.json; then
            echo "Error: UTR already used."
            exit 1
          fi

          # Use jq to add the username to the JSON file
          # We store it as: "username": "UTR_CODE"
          jq --arg user "$USER_NAME" --arg utr "$UTR_CODE" '.[$user] = $utr' pro_users.json > temp.json && mv temp.json pro_users.json
          
          git config user.name "Absora Billing Bot"
          git config user.email "billing@absora.local"
          git add pro_users.json
          git commit -m "Auto-Upgrade: $USER_NAME (UTR: $UTR_CODE)"
          git push origin main
