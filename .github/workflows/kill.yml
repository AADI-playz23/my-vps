name: ABVPS Kill Node

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'ABVPS username to kill'
        required: true
        type: string

jobs:
  kill:
    runs-on: ubuntu-22.04
    steps:
      - name: Delete tunnel file
        env:
          GH_TOKEN: ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME: ${{ github.event.inputs.username }}
        run: |
          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" "$API_URL" || true)
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])" 2>/dev/null || true)
          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'Kill node','sha':'${SHA}'}))")
            curl -s -X DELETE "$API_URL" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "User-Agent: ABVPS" \
              -H "Content-Type: application/json" \
              -d "$BODY" || true
            echo "Tunnel file deleted for $USERNAME"
          else
            echo "No tunnel file found for $USERNAME"
          fi
