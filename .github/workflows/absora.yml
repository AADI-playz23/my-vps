name: Absora Compute Core
on:
  workflow_dispatch:
    inputs:
      username:
        required: true
      plan:
        required: true
      os:
        required: false
      ui:
        required: false
      cloud:
        required: false
      mega_user:
        required: false
      mega_pass:
        required: false

jobs:
  boot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Mount Cloud Storage (Premium Only)
        env:
          PLAN: ${{ github.event.inputs.plan }}
          CLOUD: ${{ github.event.inputs.cloud }}
          MEGA_USER: ${{ github.event.inputs.mega_user }}
          MEGA_PASS: ${{ github.event.inputs.mega_pass }}
        run: |
          mkdir -p workspace/external_drive
          if [ "$CLOUD" == "mega" ] && [ "$PLAN" != "free" ]; then
            sudo apt-get update && sudo apt-get install -y rclone fuse
            mkdir -p ~/.config/rclone/
            rclone config create my_cloud mega user "$MEGA_USER" pass "$MEGA_PASS"
            rclone mount my_cloud:/ workspace/external_drive --vfs-cache-mode writes --daemon
          fi

      - name: Setup Desktop (Premium Only)
        if: ${{ github.event.inputs.ui == 'desktop' && github.event.inputs.plan != 'free' }}
        run: |
          sudo apt-get update && sudo apt-get install -y xfce4 tightvncserver novnc

      - name: Boot Engine & Cloudflare Tunnels
        env:
          USER: ${{ github.event.inputs.username }}
          PLAN: ${{ github.event.inputs.plan }}
          UI: ${{ github.event.inputs.ui }}
          STORAGE_PAT: ${{ secrets.STORAGE_PAT }}
        run: |
          # 1. Start Terminal Engine & Tunnel
          STORAGE_PATH="./workspace" nohup node server.js > server.log 2>&1 &
          nohup cloudflared tunnel --url http://localhost:8765 > term_tunnel.log 2>&1 &

          VNC_URL="null"
          
          # 2. Start Desktop Engine & Tunnel (If Paid + Requested)
          if [ "$UI" == "desktop" ] && [ "$PLAN" != "free" ]; then
             USER=root vncserver :1 -geometry 1280x720 -depth 24
             nohup /usr/share/novnc/utils/launch.sh --vnc localhost:5901 --listen 6080 > novnc.log 2>&1 &
             nohup cloudflared tunnel --url http://localhost:6080 > vnc_tunnel.log 2>&1 &
             sleep 15
             VNC_URL=$(grep -Eo 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' vnc_tunnel.log | head -n 1)
          fi
          
          sleep 15
          TERM_URL=$(grep -Eo 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' term_tunnel.log | head -n 1)
          
          # 3. Publish to Session File
          git clone https://x-access-token:$STORAGE_PAT@github.com/AADI-playz23/vps-disk.git update
          cd update
          mkdir -p session && echo "$TERM_URL|$VNC_URL" > "session/$USER.txt"
          git config user.name "AbsoraBot"
          git config user.email "bot@absora.local"
          git add session/
          git commit -m "Tunnels updated for $USER"
          git push origin main
