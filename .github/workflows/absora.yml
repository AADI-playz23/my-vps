name: Absora Compute Core
on:
  repository_dispatch:
    types: [launch_node]

jobs:
  boot_sequence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Gatekeeper API & Identity Check
        id: gatekeeper
        run: |
          CONFIG=$(curl -s -X POST https://abvps.rf.gd/api.php \
            -H "X-ABSORA-KEY: absora_master_key_2026" \
            -d "action=get_config" \
            -d "username=${{ github.event.client_payload.username }}")
          
          if [ "$(echo $CONFIG | jq -r '.status')" == "banned" ]; then exit 1; fi
          echo "PLAN=$(echo $CONFIG | jq -r '.plan')" >> $GITHUB_ENV
          echo "VAULT=$(echo $CONFIG | jq -r '.vault')" >> $GITHUB_ENV

      - name: Provision Infrastructure & Storage
        env:
          VPS_USER: ${{ github.event.client_payload.username }}
          CLOUD: ${{ github.event.client_payload.cloud }}
          TOKEN: ${{ github.event.client_payload.token }}
          STORAGE_PAT: ${{ secrets.STORAGE_PAT }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/vault
          
          # Base Git Vault Sync
          if [ "$PLAN" != "free" ]; then
             git clone https://x-access-token:${STORAGE_PAT}@github.com/YOUR_GITHUB_USERNAME/${VAULT}.git vault_data
             cp -r vault_data/${VPS_USER}/* $GITHUB_WORKSPACE/vault/ || true
          fi
          
          # External Cloud Mounting (BYOS)
          if [[ "$CLOUD" != "none" && "$TOKEN" != "" ]]; then
              sudo apt-get install -y rclone fuse
              mkdir -p ~/.config/rclone/
              echo -e "$TOKEN" > ~/.config/rclone/rclone.conf
              mkdir -p $GITHUB_WORKSPACE/vault/external_drive
              rclone mount my_cloud:/ $GITHUB_WORKSPACE/vault/external_drive --vfs-cache-mode writes --daemon
              echo "external_drive/" >> $GITHUB_WORKSPACE/vault/.gitignore
          fi

      - name: Prepare GUI Desktop (If Requested)
        if: ${{ github.event.client_payload.ui == 'desktop' }}
        run: |
          echo "Installing Desktop Environment..."
          sudo apt-get update
          sudo apt-get install -y xfce4 tightvncserver novnc
          # VNC Boot logic goes here (managed by server.js or bash script)

      - name: Start Engine & Tunnel
        env:
          VPS_USER: ${{ github.event.client_payload.username }}
          OS_CHOICE: ${{ github.event.client_payload.os }}
        run: |
          STORAGE_PATH="$GITHUB_WORKSPACE/vault" nohup node server.js > server.log 2>&1 &
          ssh -R 80:127.0.0.1:8765 nokey@localhost.run -o StrictHostKeyChecking=no -T > tunnel.log 2>&1 &
          
          sleep 15
          TUNNEL_URL=$(grep -Eo 'https://[a-zA-Z0-9-]+\.lhr\.life' tunnel.log | head -n 1)
          
          # Save tunnel to storage repo (Ensure this repo exists!)
          cd ../
          git clone https://x-access-token:${{ secrets.STORAGE_PAT }}@github.com/YOUR_GITHUB_USERNAME/storage_repo.git
          cd storage_repo
          mkdir -p session
          echo "$TUNNEL_URL" > "session/${VPS_USER}.txt"
          git config user.email "bot@absora.local"
          git config user.name "AbsoraBot"
          git add session/ || true
          git commit -m "Update session" || true
          git push origin main || true
