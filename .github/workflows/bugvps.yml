name: ABVPS Desktop Node

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'ABVPS username'
        required: true
        type: string
      os:
        description: 'OS to install'
        required: true
        default: 'ubuntu'
        type: string
      plan:
        description: 'User plan'
        required: true
        default: 'free'
        type: string

jobs:
  launch-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install ws

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Setup Display or Windows
        env:
          OS_CHOICE: ${{ github.event.inputs.os }}
          USERNAME: ${{ github.event.inputs.username }}
        run: |
          # Create user storage folder 
          mkdir -p /home/runner/abvps-workspace/$USERNAME

          # ── TEST ENVIRONMENT: TRUE WINDOWS 10 (Using Tiny10) ──
          if [ "$OS_CHOICE" = "win10" ]; then
            echo "Starting Windows 10 Virtual Machine..."
            
            docker run -d --name windows_node \
              -e VERSION="tiny10" \
              -e RAM_SIZE="5G" \
              -e CPU_CORES="2" \
              -p 8006:8006 \
              --cap-add NET_ADMIN \
              -v /home/runner/abvps-workspace/$USERNAME:/storage \
              dockurr/windows
            
            echo "VNC_PORT=8006" >> $GITHUB_ENV
            sleep 10
            
          # ── PRODUCTION ENVIRONMENTS: LINUX & WIN 11 CLONE ──
          else
            echo "Starting Native Core Environment..."
            sudo apt-get update -qq
            sudo apt-get install -y xvfb x11vnc xdotool dbus-x11 pulseaudio

            Xvfb :1 -screen 0 1280x720x24 &
            export DISPLAY=:1
            echo "DISPLAY=:1" >> $GITHUB_ENV
            sleep 2

            if [ "$OS_CHOICE" = "ubuntu" ]; then
              sudo apt-get install -y --no-install-recommends xfce4 xfce4-terminal thunar mousepad firefox
            
            elif [ "$OS_CHOICE" = "kali" ]; then
              sudo apt-get install -y --no-install-recommends xfce4 xfce4-terminal thunar mousepad nmap sqlmap hydra
            
            elif [ "$OS_CHOICE" = "alpine" ]; then
              sudo apt-get install -y --no-install-recommends xfce4 xfce4-terminal thunar mousepad
            
            elif [ "$OS_CHOICE" = "win11" ]; then
              echo "Initializing Windows 11 Clone (Native Linux + Wine)..."
              sudo dpkg --add-architecture i386
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends \
                xfce4 xfce4-terminal thunar mousepad firefox \
                wine64 wine32
            fi

            # Start the desktop interface
            startxfce4 &
            sleep 5

            # Setup noVNC web viewer (FIXED: Downloaded to home directory instead of locked /opt)
            pip3 install websockify --break-system-packages 2>/dev/null || pip install websockify
            git clone https://github.com/novnc/noVNC.git /home/runner/novnc
            mkdir -p ~/.vnc
            x11vnc -storepasswd abvps ~/.vnc/passwd

            x11vnc -display :1 -rfbauth ~/.vnc/passwd -rfbport 5900 -forever -shared -noxdamage -noxfixes &
            
            # Start websockify using the unlocked folder
            websockify --daemon --web /home/runner/novnc 6080 localhost:5900
            
            echo "VNC_PORT=6080" >> $GITHUB_ENV
          fi

      - name: Start ABVPS Backend
        env:
          VPS_USER:        ${{ github.event.inputs.username }}
          PLAN:            ${{ github.event.inputs.plan }}
          TG_BOT_TOKEN:    ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
          DB_PROXY_SECRET: ${{ secrets.DB_PROXY_SECRET }}
          PORT:            8080
        run: |
          nohup node server.js > /tmp/abvps.log 2>&1 &
          sleep 4

      - name: Open tunnel & push link
        env:
          GH_TOKEN:   ${{ secrets.VPS_DISK_
