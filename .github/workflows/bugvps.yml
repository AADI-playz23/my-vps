name: ⚡ ABVPS Linux & Android Engine

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Target User'
        required: true
      os:
        description: 'OS (cli, android, kali, arch, fedora)'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360 

    steps:
      - name: 🚀 Initialize Engine
        uses: actions/checkout@v4

      - name: 🛠️ Setup Bore Tunnel
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq
          curl -sL https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv bore /usr/local/bin/bore

      - name: 🖥️ Provision OS Container
        env:
          OS_TYPE: ${{ github.event.inputs.os }}
        run: |
          # We map every container directly to host Port 80 for the tunnel
          if [ "$OS_TYPE" == "cli" ]; then
            echo "💻 Booting Terminal..."
            docker run -d --name vps_node -p 80:7681 tsl0922/ttyd bash
            
          elif [ "$OS_TYPE" == "android" ]; then
            echo "📱 Booting Android OS..."
            docker run -d --privileged --name vps_node -p 80:6080 -e DEVICE="Samsung Galaxy S10" -e WEB_VNC=true budtmo/docker-android:emulator_11.0
            sleep 15 # Give Android UI time to generate
            
          elif [ "$OS_TYPE" == "kali" ]; then
            echo "🐉 Booting Kali Desktop..."
            docker run -d --name vps_node -p 80:3000 lscr.io/linuxserver/webtop:kali
            
          elif [ "$OS_TYPE" == "arch" ]; then
            echo "🦅 Booting Arch Desktop..."
            docker run -d --name vps_node -p 80:3000 lscr.io/linuxserver/webtop:arch
            
          elif [ "$OS_TYPE" == "fedora" ]; then
            echo "🎩 Booting Fedora Desktop..."
            docker run -d --name vps_node -p 80:3000 lscr.io/linuxserver/webtop:fedora
          fi

      - name: 🌐 Establish API Sync
        env:
          GH_TOKEN: ${{ secrets.VPS_DISK_TOKEN }}
          USER_ID: ${{ github.event.inputs.username }}
        run: |
          nohup bore local 80 --to bore.pub > /tmp/bore.log 2>&1 &
          
          for i in {1..15}; do
            BORE_PORT=$(grep -oP 'listening at bore\.pub:\K[0-9]+' /tmp/bore.log | head -1)
            [ -n "$BORE_PORT" ] && break
            sleep 3
          done

          if [ -z "$BORE_PORT" ]; then exit 1; fi
          FINAL_URL="http://bore.pub:$BORE_PORT"

          FILE_PATH="tunnel/${USER_ID}.txt"
          B64_CONTENT=$(echo -n "$FINAL_URL" | base64 -w 0)
          
          SHA=$(curl -s -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/AADI-playz23/vps-disk/contents/$FILE_PATH" | jq -r '.sha // empty')

          if [ -n "$SHA" ]; then
            JSON_DATA=$(jq -n --arg msg "Update" --arg content "$B64_CONTENT" --arg sha "$SHA" '{message: $msg, content: $content, sha: $sha}')
          else
            JSON_DATA=$(jq -n --arg msg "New" --arg content "$B64_CONTENT" '{message: $msg, content: $content}')
          fi

          curl -s -X PUT "https://api.github.com/repos/AADI-playz23/vps-disk/contents/$FILE_PATH" \
            -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" -d "$JSON_DATA"

      - name: 🛡️ Maintain Session
        run: sleep 21600
