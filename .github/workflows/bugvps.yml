name: ABVPS Node

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'ABVPS username to launch session for'
        required: true
        type: string

jobs:
  launch-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install ws

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Start ABVPS WebSocket Server
        env:
          VPS_USER:      ${{ github.event.inputs.username }}
          TG_BOT_TOKEN:  ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:    ${{ secrets.TG_CHAT_ID }}
          PORT:          8080
        run: |
          nohup node server.js > /tmp/abvps.log 2>&1 &
          sleep 6
          echo "=== Boot log ==="
          cat /tmp/abvps.log

      - name: Open cloudflared tunnel & push link
        env:
          GH_TOKEN:   ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME:   ${{ github.event.inputs.username }}
          TG_TOKEN:   ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT:    ${{ secrets.TG_CHAT_ID }}
        run: |
          cloudflared tunnel --url http://localhost:8080 > /tmp/cf_output.txt 2>&1 &

          # Wait for URL
          LINK=""
          for i in $(seq 1 40); do
            LINK=$(grep -oP 'https://[a-z0-9\-]+\.trycloudflare\.com' /tmp/cf_output.txt 2>/dev/null | head -1)
            [ -n "$LINK" ] && break
            sleep 1
          done

          if [ -z "$LINK" ]; then
            echo "ERROR: No tunnel URL"; cat /tmp/cf_output.txt; exit 1
          fi
          echo "Tunnel: $LINK"

          # Push tunnel URL to vps-disk repo (session/username → tunnel/username)
          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"
          CONTENT=$(echo -n "$LINK" | base64 -w 0)

          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" "$API_URL")
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || true)

          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'Update tunnel for ${USERNAME}','content':'${CONTENT}','sha':'${SHA}'}))")
          else
            BODY=$(python3 -c "import json; print(json.dumps({'message':'New tunnel for ${USERNAME}','content':'${CONTENT}'}))")
          fi

          curl -s -X PUT "$API_URL" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "User-Agent: ABVPS" \
            -H "Content-Type: application/json" \
            -d "$BODY"
          echo "Tunnel link pushed."

          # Also notify Telegram storage chat that node is online
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TG_CHAT}\",\"text\":\"🟢 <b>${USERNAME}</b> node online\\nTunnel: ${LINK}\",\"parse_mode\":\"HTML\"}" \
            > /dev/null

      - name: Keep session alive (55 min)
        run: sleep 3300

      - name: Cleanup tunnel link & notify offline
        if: always()
        env:
          GH_TOKEN:   ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME:   ${{ github.event.inputs.username }}
          TG_TOKEN:   ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT:    ${{ secrets.TG_CHAT_ID }}
        run: |
          # Delete tunnel file
          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" "$API_URL")
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])" 2>/dev/null || true)
          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'Clean tunnel ${USERNAME}','sha':'${SHA}'}))")
            curl -s -X DELETE "$API_URL" -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" -H "Content-Type: application/json" -d "$BODY"
          fi

          # Notify Telegram node is offline
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TG_CHAT}\",\"text\":\"🔴 <b>${USERNAME}</b> node offline. Backup saved.\",\"parse_mode\":\"HTML\"}" \
            > /dev/null
