name: ABVPS Desktop Node
on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username'
        required: true
        type: string
      os:
        description: 'OS'
        required: true
        default: 'ubuntu'
        type: string
      plan:
        description: 'Plan'
        required: true
        default: 'free'
        type: string
jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm install
        run: npm install ws
      - name: install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
      - name: setup desktop
        env:
          OS_CHOICE: ${{ github.event.inputs.os }}
          USERNAME: ${{ github.event.inputs.username }}
        run: |
          mkdir -p /home/runner/abvps-workspace/$USERNAME
          sudo apt-get update -qq
          sudo apt-get install -y nginx novnc websockify curl wget netcat-openbsd

          # ── KVM-based OS (Android / ChromeOS / LineageOS) ────────────────
          if [ "$OS_CHOICE" = "android" ] || [ "$OS_CHOICE" = "chromeos" ] || [ "$OS_CHOICE" = "lineage" ]; then
            sudo apt-get install -y qemu-kvm qemu-utils ovmf cpu-checker
            sudo modprobe kvm-intel || sudo modprobe kvm-amd || true
            echo "KVM status:"; sudo kvm-ok || true

            if [ "$OS_CHOICE" = "android" ]; then
              echo "Downloading Android x86 9.0..."
              wget -q --show-progress -O /tmp/os.iso \
                "https://sourceforge.net/projects/android-x86/files/Release%209.0/android-x86_64-9.0-r2.iso/download"
              RAM=2048

            elif [ "$OS_CHOICE" = "lineage" ]; then
              echo "Downloading LineageOS (Android x86 9.0 base)..."
              wget -q --show-progress -O /tmp/os.iso \
                "https://sourceforge.net/projects/android-x86/files/Release%209.0/android-x86_64-9.0-r2.iso/download"
              RAM=2048

            elif [ "$OS_CHOICE" = "chromeos" ]; then
              echo "Downloading ChromeOS Flex..."
              wget -q --show-progress -O /tmp/os.iso \
                "https://dl.google.com/dl/edgedl/chromeos/recovery/chromeos_15623.0.0_reven_recovery_stable-channel_mp-v2.bin.zip"
              cd /tmp && unzip -q os.iso -d chromeos_img && cd -
              CHROMEOS_BIN=$(find /tmp/chromeos_img -name "*.bin" | head -1)
              mv "$CHROMEOS_BIN" /tmp/os.iso || true
              RAM=4096
            fi

            qemu-img create -f qcow2 /tmp/vm.qcow2 12G

            sudo qemu-system-x86_64 \
              -enable-kvm \
              -m $RAM \
              -smp 2 \
              -cpu host \
              -drive file=/tmp/vm.qcow2,format=qcow2,if=virtio \
              -drive file=/tmp/os.iso,format=raw,readonly=on,media=cdrom \
              -boot order=d \
              -vga virtio \
              -display vnc=127.0.0.1:10 \
              -net nic,model=virtio \
              -net user \
              -usb -device usb-tablet \
              -daemonize

            echo "Waiting for KVM VNC on port 5910..."
            for i in $(seq 1 60); do
              nc -z localhost 5910 2>/dev/null && echo "KVM VNC ready" && break
              echo "  kvm check $i..."
              sleep 5
            done

            websockify --web /usr/share/novnc/ --heartbeat=30 6080 localhost:5910 &

          # ── Native Linux OS ──────────────────────────────────────────────
          else
            sudo apt-get install -y xvfb x11vnc xfce4 xfce4-terminal thunar mousepad

            if [ "$OS_CHOICE" = "ubuntu" ]; then
              sudo apt-get install -y --no-install-recommends firefox
            elif [ "$OS_CHOICE" = "fedora" ]; then
              sudo apt-get install -y --no-install-recommends firefox
              sudo hostnamectl set-hostname fedora-abvps || true
            elif [ "$OS_CHOICE" = "alpine" ]; then
              sudo hostnamectl set-hostname alpine-abvps || true
            elif [ "$OS_CHOICE" = "kali" ]; then
              sudo apt-get install -y --no-install-recommends nmap sqlmap hydra john aircrack-ng nikto gobuster
              sudo hostnamectl set-hostname kali-abvps || true
            elif [ "$OS_CHOICE" = "arch" ]; then
              sudo hostnamectl set-hostname arch-abvps || true
            fi

            Xvfb :1 -screen 0 1280x720x24 &
            sleep 3
            DISPLAY=:1 xfce4-session &
            sleep 6
            x11vnc -display :1 -nopw -forever -shared -rfbport 5900 -bg -o /tmp/x11vnc.log
            sleep 3

            echo "Waiting for x11vnc on 5900..."
            for i in $(seq 1 20); do
              nc -z localhost 5900 2>/dev/null && echo "x11vnc ready" && break
              sleep 2
            done

            websockify --web /usr/share/novnc/ --heartbeat=30 6080 localhost:5900 &
          fi

          sleep 3
          echo "Waiting for websockify on 6080..."
          for i in $(seq 1 20); do
            nc -z localhost 6080 2>/dev/null && echo "websockify ready" && break
            sleep 2
          done

          # ── nginx ────────────────────────────────────────────────────────
          printf '%s\n' \
            'server {' \
            '  listen 80;' \
            '  location /novnc/ {' \
            '    proxy_pass http://127.0.0.1:6080/;' \
            '    proxy_http_version 1.1;' \
            '    proxy_set_header Upgrade $http_upgrade;' \
            '    proxy_set_header Connection "upgrade";' \
            '    proxy_set_header Host $host;' \
            '    proxy_set_header X-Forwarded-Proto $scheme;' \
            '    proxy_read_timeout 3600s;' \
            '    proxy_send_timeout 3600s;' \
            '    proxy_buffering off;' \
            '  }' \
            '  location /websockify {' \
            '    proxy_pass http://127.0.0.1:6080/websockify;' \
            '    proxy_http_version 1.1;' \
            '    proxy_set_header Upgrade $http_upgrade;' \
            '    proxy_set_header Connection "upgrade";' \
            '    proxy_set_header Host $host;' \
            '    proxy_read_timeout 3600s;' \
            '    proxy_send_timeout 3600s;' \
            '    proxy_buffering off;' \
            '  }' \
            '  location = / { return 302 /novnc/vnc.html; }' \
            '  location /abvps/ {' \
            '    proxy_pass http://127.0.0.1:8081/;' \
            '    proxy_http_version 1.1;' \
            '    proxy_set_header Upgrade $http_upgrade;' \
            '    proxy_set_header Connection "upgrade";' \
            '    proxy_set_header Host $host;' \
            '    proxy_read_timeout 3600s;' \
            '  }' \
            '}' | sudo tee /etc/nginx/sites-available/default

          sudo nginx -t && sudo systemctl restart nginx

          echo "Waiting for nginx on port 80..."
          for i in $(seq 1 20); do
            S=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/novnc/ || echo "000")
            echo "  nginx check $i: $S"
            if [ "$S" = "200" ] || [ "$S" = "301" ] || [ "$S" = "302" ]; then echo "nginx ready"; break; fi
            sleep 3
          done

      - name: start backend
        env:
          VPS_USER: ${{ github.event.inputs.username }}
          PLAN: ${{ github.event.inputs.plan }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DB_PROXY_SECRET: ${{ secrets.DB_PROXY_SECRET }}
          PORT: 8081
        run: |
          nohup node server.js > /tmp/abvps.log 2>&1 &
          sleep 4
          cat /tmp/abvps.log

      - name: open tunnel
        env:
          GH_TOKEN: ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME: ${{ github.event.inputs.username }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
          OS_CHOICE: ${{ github.event.inputs.os }}
        run: |
          cloudflared tunnel --url http://localhost:80 > /tmp/cf.txt 2>&1 &

          LINK=""
          for i in $(seq 1 50); do
            LINK=$(grep -oP 'https://[a-z0-9\-]+\.trycloudflare\.com' /tmp/cf.txt 2>/dev/null | head -1 || true)
            [ -n "$LINK" ] && echo "tunnel ready: $LINK" && break
            echo "  waiting for tunnel... attempt $i"
            sleep 2
          done

          if [ -z "$LINK" ]; then
            echo "cloudflare tunnel failed"
            cat /tmp/cf.txt
            exit 1
          fi

          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"
          CONTENT=$(echo -n "$LINK" | base64 -w 0)
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" "$API_URL" || true)
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || true)

          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'update','content':'${CONTENT}','sha':'${SHA}'}))")
          else
            BODY=$(python3 -c "import json; print(json.dumps({'message':'new','content':'${CONTENT}'}))")
          fi

          PUSH=$(curl -s -X PUT "$API_URL" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "User-Agent: ABVPS" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "GitHub push: $PUSH"

          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TG_CHAT}\",\"text\":\"online: ${USERNAME} os: ${OS_CHOICE} ${LINK}/novnc/vnc.html\"}" > /dev/null || true

      - name: wait
        env:
          GH_TOKEN: ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME: ${{ github.event.inputs.username }}
          OS_CHOICE: ${{ github.event.inputs.os }}
          PLAN: ${{ github.event.inputs.plan }}
        run: |
          sleep 20700
          if [ "$PLAN" != "free" ]; then
            curl -s -X POST https://api.github.com/repos/AADI-playz23/my-vps/actions/workflows/bugvps.yml/dispatches \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "{\"ref\":\"main\",\"inputs\":{\"username\":\"$USERNAME\",\"os\":\"$OS_CHOICE\",\"plan\":\"$PLAN\"}}" || true
            sleep 60
          fi

      - name: cleanup
        if: always()
        env:
          GH_TOKEN: ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME: ${{ github.event.inputs.username }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" "$API_URL" || true)
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])" 2>/dev/null || true)
          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'clean','sha':'${SHA}'}))")
            curl -s -X DELETE "$API_URL" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "User-Agent: ABVPS" \
              -H "Content-Type: application/json" \
              -d "$BODY" || true
          fi
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TG_CHAT}\",\"text\":\"offline: ${USERNAME}\"}" > /dev/null || true
