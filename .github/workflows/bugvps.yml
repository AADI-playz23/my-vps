name: Absora Compute Node

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'User Name'
        required: true
      plan:
        description: 'Account Tier (free or pro)'
        required: true
        default: 'free'

concurrency:
  group: vps-${{ github.event.inputs.username }}
  cancel-in-progress: true

jobs:
  run-vps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Compute Repo (Repo 1)
      uses: actions/checkout@v4
      with:
        path: compute_repo

    - name: Checkout Private Storage Repo (Repo 2)
      uses: actions/checkout@v4
      with:
        repository: YOUR_GITHUB_USERNAME/vps-storage # UPDATE THIS!
        token: ${{ secrets.STORAGE_PAT }}
        path: storage_repo
        ref: main 

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Node Dependencies
      run: |
        cd compute_repo
        npm install ws

    - name: Start Node Server & Tunnel
      env:
        VPS_USER: ${{ github.event.inputs.username }}
        VPS_PLAN: ${{ github.event.inputs.plan }}
      run: |
        cd storage_repo
        git config user.name "Absora Auto-System"
        git config user.email "system@absora.local"
        
        cd ../compute_repo
        
        # TIER ENFORCEMENT LOGIC
        if [ "${{ github.event.inputs.plan }}" == "pro" ]; then
          echo "Booting PRO Persistent Vault..."
          STORAGE_PATH="${{ github.workspace }}/storage_repo" nohup node server.js > server.log 2>&1 &
        else
          echo "Booting FREE Ephemeral Vault..."
          mkdir -p "${{ github.workspace }}/temp_vault"
          STORAGE_PATH="${{ github.workspace }}/temp_vault" nohup node server.js > server.log 2>&1 &
        fi
        
        ssh -R 80:127.0.0.1:8765 nokey@localhost.run -o StrictHostKeyChecking=no -T > tunnel.log 2>&1 &
        
        for i in {1..30}; do
          if grep -q "lhr.life" tunnel.log; then break; fi
          sleep 2
        done

    - name: Push Session to Private Repo
      run: |
        cd compute_repo
        TUNNEL_URL=$(grep -Eo 'https://[a-zA-Z0-9-]+\.lhr\.life' tunnel.log | head -n 1)
        
        if [ -z "$TUNNEL_URL" ]; then exit 1; fi
        
        cd ../storage_repo
        git pull origin main || true

        rm -f "session/${{ github.event.inputs.username }}.txt" || true
        mkdir -p session
        echo "$TUNNEL_URL" > "session/${{ github.event.inputs.username }}.txt"

        # ALWAYS save the tunnel link so the dashboard connects
        git add session/ || true

        # ONLY save the user files if they are PRO
        if [ "${{ github.event.inputs.plan }}" == "pro" ]; then
          mkdir -p "users/${{ github.event.inputs.username }}"
          if [ ! -f "users/${{ github.event.inputs.username }}/welcome.txt" ]; then
            echo "Welcome to Absora PRO! Your storage is persistent." > "users/${{ github.event.inputs.username }}/welcome.txt"
          fi
          git add "users/${{ github.event.inputs.username }}/" || true
        fi

        git commit -m "Update session for ${{ github.event.inputs.username }}" || true
        git push origin HEAD:main || echo "[WARNING] Push failed, but keeping runner alive."

    - name: Keep Compute Runner Alive
      run: |
        while pgrep -f "node server.js" > /dev/null; do sleep 5; done
