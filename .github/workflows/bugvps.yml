name: BUGVPS Node

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'BugVPS username to launch session for'
        required: true
        type: string

jobs:
  launch-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Install tmate (provides the SSH / web terminal link) ──
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        id: tmate
        with:
          limit-access-to-actor: false

      # ── Wait for tmate to generate a web URL ──
      - name: Wait for tmate URL
        run: |
          for i in $(seq 1 30); do
            LINK=$(cat /tmp/tmate-session 2>/dev/null || true)
            if [ -n "$LINK" ]; then
              echo "Tmate link: $LINK"
              break
            fi
            sleep 2
          done

      # ── Push session link to vps-disk (private storage repo) ──
      - name: Push session link to storage
        env:
          GH_TOKEN: ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME: ${{ github.event.inputs.username }}
        run: |
          SESSION_LINK=$(echo "${{ steps.tmate.outputs.web-url }}")
          echo "Session link: $SESSION_LINK"

          # Prepare the file content
          echo "$SESSION_LINK" > session_link.txt

          # Use GitHub API to push the session file
          CONTENT=$(base64 -w 0 session_link.txt)
          FILE_PATH="session/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"

          # Check if file already exists (get SHA)
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
                              -H "User-Agent: BugVPS-Actions" \
                              "$API_URL")
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || true)

          # Build request body
          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'Update session for $USERNAME','content':'$CONTENT','sha':'$SHA'}))")
          else
            BODY=$(python3 -c "import json; print(json.dumps({'message':'New session for $USERNAME','content':'$CONTENT'}))")
          fi

          curl -s -X PUT "$API_URL" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "User-Agent: BugVPS-Actions" \
            -H "Content-Type: application/json" \
            -d "$BODY"

      # ── Keep session alive for up to 55 min ──
      - name: Keep session alive
        run: sleep 3300
