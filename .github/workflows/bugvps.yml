name: BUGVPS Compute Node

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'User Name'
        required: true

# This automatically kills the user's old VPS when they deploy a new one
concurrency:
  group: vps-${{ github.event.inputs.username }}
  cancel-in-progress: true

jobs:
  run-vps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Compute Repo (Repo 1)
      uses: actions/checkout@v4
      with:
        path: compute_repo

    - name: Checkout Private Storage Repo (Repo 2)
      uses: actions/checkout@v4
      with:
        repository: AADI-playz23/vps-disk # UPDATE THIS!
        token: ${{ secrets.STORAGE_PATH }}
        path: storage_repo
        ref: main 

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Node Dependencies
      run: |
        cd compute_repo
        npm install ws

    - name: Start Node Server & Tunnel
      env:
        VPS_USER: ${{ github.event.inputs.username }}
      run: |
        cd storage_repo
        git config user.name "BUGVPS Auto-System"
        git config user.email "system@bugvps.local"
        
        cd ../compute_repo
        
        STORAGE_PATH="${{ github.workspace }}/storage_repo" nohup node server.js > server.log 2>&1 &
        echo "Node.js compute core booted."
        
        # Start tunnel
        ssh -R 80:127.0.0.1:8765 nokey@localhost.run -o StrictHostKeyChecking=no -T > tunnel.log 2>&1 &
        echo "Waiting for tunnel initialization..."
        
        # THE FIX: Dynamic waiting. Checks every 2 seconds for up to 60 seconds.
        for i in {1..30}; do
          if grep -q "lhr.life" tunnel.log; then
            echo "Tunnel URL found!"
            break
          fi
          sleep 2
        done

    - name: Push Session and Workspace to Private Repo
      run: |
        cd compute_repo
        TUNNEL_URL=$(grep -Eo 'https://[a-zA-Z0-9-]+\.lhr\.life' tunnel.log | head -n 1)
        
        if [ -z "$TUNNEL_URL" ]; then
          echo "Error: Tunnel URL generation failed. Here is the log:"
          cat tunnel.log
          exit 1
        fi
        
        echo "Successfully generated NEW Tunnel URL: $TUNNEL_URL"
        
        cd ../storage_repo
        git pull origin main || true

        rm -f "session/${{ github.event.inputs.username }}.txt" || true

        mkdir -p session
        echo "$TUNNEL_URL" > "session/${{ github.event.inputs.username }}.txt"

        mkdir -p "users/${{ github.event.inputs.username }}"
        if [ ! -f "users/${{ github.event.inputs.username }}/welcome.txt" ]; then
          echo "Welcome to BUGVPS! Your secure, private storage is ready." > "users/${{ github.event.inputs.username }}/welcome.txt"
        fi

        git add session/ "users/${{ github.event.inputs.username }}/" || true
        git commit -m "Update session for ${{ github.event.inputs.username }}" || true
        git push origin HEAD:main || echo "[WARNING] Push failed, but keeping runner alive."

    - name: Keep Compute Runner Alive
      run: |
        echo "Compute node is live! Waiting for frontend handshake..."
        while pgrep -f "node server.js" > /dev/null; do
          sleep 5
        done
        echo "Session terminated."
