name: ABVPS Desktop Node
run-name: "ABVPS Desktop: ${{ inputs.os }} for ${{ inputs.username }}"

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'ABVPS username'
        required: true
        type: string
      os:
        description: 'OS to install'
        required: true
        default: 'ubuntu'
        type: choice
        options:
          - ubuntu
          - kali
          - alpine
          - fedora
          - arch
          - android
          - chromeos
          - lineage
      plan:
        description: 'User plan'
        required: true
        default: 'free'
        type: string

jobs:
  launch-desktop:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install ws
          curl -sL https://github.com | tar xz
          sudo mv bore /usr/local/bin/bore

      - name: Setup Desktop Environment
        env:
          OS_CHOICE: ${{ github.event.inputs.os }}
          USERNAME: ${{ github.event.inputs.username }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nginx guacd tomcat9 wget curl netcat-openbsd xrdp
          
          # Install Desktop Components based on OS choice
          sudo apt-get install -y --no-install-recommends xfce4 xfce4-terminal thunar mousepad firefox
          
          if [[ "$OS_CHOICE" == "kali" ]]; then
            sudo apt-get install -y nmap sqlmap hydra john aircrack-ng
          elif [[ "$OS_CHOICE" == "android" || "$OS_CHOICE" == "lineage" ]]; then
            IMG="redroid/redroid:12.0.0-latest"
            [ "$OS_CHOICE" == "lineage" ] && IMG="redroid/redroid:11.0.0-latest"
            docker run -d --name android_node --privileged -p 5900:5900 $IMG androidboot.use_memfd=true || true
          fi

          echo "runner:abvps" | sudo chpasswd
          echo "xfce4-session" | sudo tee /home/runner/.xsession
          sudo systemctl enable xrdp
          sudo systemctl restart xrdp

          # Configure Guacamole
          sudo mkdir -p /etc/guacamole /var/lib/tomcat9/.guacamole
          sudo tee /etc/guacamole/user-mapping.xml > /dev/null << 'EOF'
<user-mapping>
    <authorize username="abvps" password="abvps">
        <connection name="desktop">
            <protocol>rdp</protocol>
            <param name="hostname">localhost</param>
            <param name="port">3389</param>
            <param name="username">runner</param>
            <param name="password">abvps</param>
            <param name="security">any</param>
            <param name="ignore-cert">true</param>
        </connection>
    </authorize>
</user-mapping>
EOF
          sudo bash -c 'echo "GUACAMOLE_HOME=/etc/guacamole" >> /etc/default/tomcat9'
          wget -q -O /tmp/guacamole.war "https://archive.apache.org"
          sudo cp /tmp/guacamole.war /var/lib/tomcat9/webapps/guacamole.war
          sudo systemctl restart guacd tomcat9

          # Configure Nginx Reverse Proxy
          sudo tee /etc/nginx/sites-available/default > /dev/null << 'EOF'
server {
    listen 80;
    location / { return 302 /guacamole/; }
    location /guacamole/ {
        proxy_pass http://127.0.0.1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
EOF
          sudo systemctl restart nginx

      - name: Start Tunnel and Push Link
        env:
          GH_TOKEN: ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME: ${{ github.event.inputs.username }}
        run: |
          # Start Bore tunnel
          bore local 80 --to bore.pub > /tmp/bore.txt 2>&1 &
          
          # Extract port
          for i in {1..20}; do
            BORE_PORT=$(grep -oP 'listening at bore\.pub:\K[0-9]+' /tmp/bore.txt || true)
            [ -n "$BORE_PORT" ] && break
            sleep 2
          done

          LINK="http://bore.pub:${BORE_PORT}"
          echo "Public Link: $LINK"

          # Prepare JSON to push link to vps-disk repo
          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com{FILE_PATH}"
          CONTENT=$(echo -n "$LINK" | base64 -w 0)
          
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" "$API_URL")
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")

          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'Update','content':'$CONTENT','sha':'$SHA'}))")
          else
            BODY=$(python3 -c "import json; print(json.dumps({'message':'Create','content':'$CONTENT'}))")
          fi

          curl -X PUT -H "Authorization: Bearer $GH_TOKEN" -d "$BODY" "$API_URL"
          
          # Keep alive for 6 hours
          sleep 21600
