name: ABVPS Desktop Node

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'ABVPS username'
        required: true
        type: string
      os:
        description: 'OS to install'
        required: true
        default: 'ubuntu'
        type: string
      plan:
        description: 'User plan'
        required: true
        default: 'free'
        type: string

jobs:
  launch-desktop:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install ws

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Setup RDP Engine & Guacamole Gateway
        env:
          OS_CHOICE: ${{ github.event.inputs.os }}
          USERNAME: ${{ github.event.inputs.username }}
        run: |
          mkdir -p /home/runner/abvps-workspace/$USERNAME

          # ── 1. Install Core Gateway Services ──
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends nginx guacd tomcat9 wget unzip

          # ── 2. OS Setup (Real Windows VM vs Native Linux) ──
          if [ "$OS_CHOICE" = "win10" ] || [ "$OS_CHOICE" = "win11" ]; then
            echo "Starting Real Windows Virtual Machine..."
            
            WIN_VER="11"
            if [ "$OS_CHOICE" = "win10" ]; then WIN_VER="tiny10"; fi

            docker run -d --name windows_node \
              -e VERSION="$WIN_VER" -e RAM_SIZE="5G" -e CPU_CORES="2" \
              -e USERNAME="runner" -e PASSWORD="abvps" \
              -p 3389:3389 --cap-add NET_ADMIN \
              -v /home/runner/abvps-workspace/$USERNAME:/storage \
              dockurr/windows
            sleep 10
            
          else
            echo "Starting Native Core Environment..."
            sudo apt-get install -y --no-install-recommends xrdp
            
            if [ "$OS_CHOICE" = "ubuntu" ]; then
              sudo apt-get install -y --no-install-recommends xfce4 xfce4-terminal thunar mousepad firefox
            elif [ "$OS_CHOICE" = "kali" ]; then
              sudo apt-get install -y --no-install-recommends xfce4 xfce4-terminal thunar mousepad nmap sqlmap hydra
            elif [ "$OS_CHOICE" = "alpine" ]; then
              sudo apt-get install -y --no-install-recommends xfce4 xfce4-terminal thunar mousepad
            fi

            echo "runner:abvps" | sudo chpasswd
            echo "xfce4-session" > /home/runner/.xsession
            sudo systemctl restart xrdp
          fi

          # ── 3. Guacamole Configuration ──
          sudo mkdir -p /etc/guacamole
          cat << 'EOF' | sudo tee /etc/guacamole/user-mapping.xml
          <user-mapping>
              <authorize username="abvps" password="abvps">
                  <connection name="desktop">
                      <protocol>rdp</protocol>
                      <param name="hostname">localhost</param>
                      <param name="port">3389</param>
                      <param name="username">runner</param>
                      <param name="password">abvps</param>
                      <param name="security">any</param>
                      <param name="ignore-cert">true</param>
                      <param name="resize-method">display-update</param>
                  </connection>
              </authorize>
          </user-mapping>
          EOF

          cat << 'EOF' | sudo tee /etc/guacamole/guacamole.properties
          guacd-hostname: localhost
          guacd-port: 4822
          user-mapping: /etc/guacamole/user-mapping.xml
          EOF

          # FIXED DIRECTORY: Tomcat9 looks in /var/lib/tomcat9
          sudo mkdir -p /var/lib/tomcat9/.guacamole
          sudo ln -sf /etc/guacamole/guacamole.properties /var/lib/tomcat9/.guacamole/

          wget -qO guacamole.war "https://dlcdn.apache.org/guacamole/1.5.4/binary/guacamole-1.5.4.war"
          sudo mv guacamole.war /var/lib/tomcat9/webapps/guacamole.war
          sudo systemctl restart guacd tomcat9

          # ── 4. Nginx Reverse Proxy ──
          cat << 'EOF' | sudo tee /etc/nginx/sites-available/default
          server {
              listen 80;
              
              location /guacamole/ {
                  proxy_pass http://localhost:8080/guacamole/;
                  proxy_buffering off;
                  proxy_http_version 1.1;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection $http_connection;
              }

              location / {
                  proxy_pass http://localhost:8081/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
              }
          }
          EOF
          sudo systemctl restart nginx
          echo "VNC_PORT=80" >> $GITHUB_ENV

      - name: Start ABVPS Backend
        env:
          VPS_USER:        ${{ github.event.inputs.username }}
          PLAN:            ${{ github.event.inputs.plan }}
          TG_BOT_TOKEN:    ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
          DB_PROXY_SECRET: ${{ secrets.DB_PROXY_SECRET }}
          PORT:            8081 
        run: |
          nohup node server.js > /tmp/abvps.log 2>&1 &
          sleep 4

      - name: Open tunnel & push link
        env:
          GH_TOKEN:   ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME:   ${{ github.event.inputs.username }}
          OS_CHOICE:  ${{ github.event.inputs.os }}
        run: |
          cloudflared tunnel --url http://localhost:${{ env.VNC_PORT }} > /tmp/cf_vnc.txt 2>&1 &

          LINK=""
          for i in $(seq 1 50); do
            LINK=$(grep -oP 'https://[a-z0-9\-]+\.trycloudflare\.com' /tmp/cf_vnc.txt 2>/dev/null | head -1)
            [ -n "$LINK" ] && break
            sleep 1
          done

          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"
          CONTENT=$(echo -n "$LINK" | base64 -w 0)

          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" "$API_URL")
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || true)

          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'Update tunnel','content':'${CONTENT}','sha':'${SHA}'}))")
          else
            BODY=$(python3 -c "import json; print(json.dumps({'message':'New tunnel','content':'${CONTENT}'}))")
          fi

          curl -s -X PUT "$API_URL" -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" -H "Content-Type: application/json" -d "$BODY"

      - name: Wait and Relay Handoff
        env:
          GH_TOKEN:  ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME:  ${{ github.event.inputs.username }}
          OS_CHOICE: ${{ github.event.inputs.os }}
          PLAN:      ${{ github.event.inputs.plan }}
        run: |
          sleep 20700

          if [ "$PLAN" != "free" ]; then
            echo "Relay sequence initiated."
            curl -X POST https://api.github.com/repos/AADI-playz23/my-vps/actions/workflows/bugvps.yml/dispatches \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "{\"ref\":\"main\",\"inputs\":{\"username\":\"$USERNAME\",\"os\":\"$OS_CHOICE\",\"plan\":\"$PLAN\"}}"
            sleep 60
          fi
          
          echo "Time limit reached."

      - name: Cleanup on exit
        if: always()
        env:
          GH_TOKEN:  ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME:  ${{ github.event.inputs.username }}
        run: |
          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" "$API_URL")
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])" 2>/dev/null || true)
          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'Clean tunnel','sha':'${SHA}'}))")
            curl -s -X DELETE "$API_URL" -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" -H "Content-Type: application/json" -d "$BODY"
          fi
