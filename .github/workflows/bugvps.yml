name: ABVPS Desktop Node

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'ABVPS username'
        required: true
        type: string
      os:
        description: 'OS to install'
        required: true
        default: 'ubuntu'
        type: string
      plan:
        description: 'User plan'
        required: true
        default: 'free'
        type: string

jobs:
  launch-desktop:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install ws

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Setup RDP Engine & Guacamole Gateway
        env:
          OS_CHOICE: ${{ github.event.inputs.os }}
          USERNAME:  ${{ github.event.inputs.username }}
        run: |
          mkdir -p /home/runner/abvps-workspace/$USERNAME

          # ── 1. Core packages (always installed, ALL OS types) ──
          sudo apt-get update -qq
          sudo apt-get install -y nginx guacd tomcat9 wget unzip curl netcat-openbsd

          # ── 2. OS Setup ────────────────────────────────────────
          if [ "$OS_CHOICE" = "win10" ] || [ "$OS_CHOICE" = "win11" ]; then
            echo "Starting Windows container..."

            WIN_VER="tiny11"
            VM_RAM="4G"
            if [ "$OS_CHOICE" = "win10" ]; then
              WIN_VER="tiny10"
              VM_RAM="3G"
            fi

            docker run -d --name windows_node \
              -e VERSION="$WIN_VER" \
              -e RAM_SIZE="$VM_RAM" \
              -e CPU_CORES="2" \
              -e USERNAME="runner" \
              -e PASSWORD="abvps" \
              -p 3389:3389 \
              --cap-add NET_ADMIN \
              -v /home/runner/abvps-workspace/$USERNAME:/storage \
              dockurr/windows

            echo "Waiting for Windows RDP to become ready (up to 10 min)..."
            for i in $(seq 1 60); do
              if nc -z localhost 3389 2>/dev/null; then
                echo "RDP port 3389 is open after ${i} retries."
                break
              fi
              echo "  attempt $i/60 — waiting 10s..."
              sleep 10
            done

          else
            echo "Starting native Linux desktop..."
            sudo apt-get install -y xrdp

            if [ "$OS_CHOICE" = "ubuntu" ]; then
              sudo apt-get install -y --no-install-recommends \
                xfce4 xfce4-terminal thunar mousepad firefox
            elif [ "$OS_CHOICE" = "kali" ]; then
              sudo apt-get install -y --no-install-recommends \
                xfce4 xfce4-terminal thunar mousepad \
                nmap sqlmap hydra john aircrack-ng
            elif [ "$OS_CHOICE" = "alpine" ]; then
              sudo apt-get install -y --no-install-recommends \
                xfce4 xfce4-terminal thunar mousepad
            fi

            echo "runner:abvps" | sudo chpasswd
            echo "xfce4-session" | sudo tee /home/runner/.xsession
            sudo chmod 755 /home/runner/.xsession
            sudo systemctl enable xrdp
            sudo systemctl restart xrdp

            echo "Waiting for xrdp on port 3389..."
            for i in $(seq 1 30); do
              if nc -z localhost 3389 2>/dev/null; then
                echo "xrdp ready after ${i}s"; break
              fi
              sleep 2
            done
          fi

          # ── 3. Guacamole config ────────────────────────────────
          sudo mkdir -p /etc/guacamole

          sudo tee /etc/guacamole/user-mapping.xml > /dev/null << 'EOF'
<user-mapping>
    <authorize username="abvps" password="abvps">
        <connection name="desktop">
            <protocol>rdp</protocol>
            <param name="hostname">localhost</param>
            <param name="port">3389</param>
            <param name="username">runner</param>
            <param name="password">abvps</param>
            <param name="security">any</param>
            <param name="ignore-cert">true</param>
            <param name="resize-method">display-update</param>
            <param name="enable-wallpaper">true</param>
            <param name="enable-font-smoothing">true</param>
        </connection>
    </authorize>
</user-mapping>
EOF

          sudo tee /etc/guacamole/guacamole.properties > /dev/null << 'EOF'
guacd-hostname: localhost
guacd-port: 4822
user-mapping: /etc/guacamole/user-mapping.xml
EOF

          sudo chmod -R 755 /etc/guacamole
          sudo chown -R tomcat9:tomcat9 /etc/guacamole

          sudo mkdir -p /var/lib/tomcat9/.guacamole
          sudo ln -sf /etc/guacamole/guacamole.properties /var/lib/tomcat9/.guacamole/guacamole.properties
          sudo ln -sf /etc/guacamole/user-mapping.xml      /var/lib/tomcat9/.guacamole/user-mapping.xml
          sudo chown -h tomcat9:tomcat9 /var/lib/tomcat9/.guacamole/guacamole.properties
          sudo chown -h tomcat9:tomcat9 /var/lib/tomcat9/.guacamole/user-mapping.xml

          sudo bash -c 'echo "GUACAMOLE_HOME=/etc/guacamole" >> /etc/default/tomcat9'

          wget -q -O /tmp/guacamole.war \
            "https://archive.apache.org/dist/guacamole/1.5.4/binary/guacamole-1.5.4.war"
          sudo cp /tmp/guacamole.war /var/lib/tomcat9/webapps/guacamole.war
          sudo chown tomcat9:tomcat9 /var/lib/tomcat9/webapps/guacamole.war

          sudo systemctl restart guacd
          sudo systemctl restart tomcat9

          echo "Waiting for Tomcat to deploy guacamole.war..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/guacamole/)
            echo "  attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "Guacamole is UP (HTTP $STATUS)"
              break
            fi
            sleep 5
          done

          echo "=== Guacamole final status ==="
          curl -s -o /dev/null -w "HTTP %{http_code}\n" http://localhost:8080/guacamole/
          echo "=== guacd status ==="
          sudo systemctl status guacd --no-pager | tail -5
          echo "=== tomcat9 status ==="
          sudo systemctl status tomcat9 --no-pager | tail -5

          # ── 4. Nginx reverse proxy ─────────────────────────────
          sudo tee /etc/nginx/sites-available/default > /dev/null << 'EOF'
server {
    listen 80;

    location /guacamole/ {
        proxy_pass          http://127.0.0.1:8080/guacamole/;
        proxy_buffering     off;
        proxy_http_version  1.1;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    Upgrade         $http_upgrade;
        proxy_set_header    Connection      "upgrade";
        proxy_set_header    Host            $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    location = / {
        return 302 /guacamole/;
    }

    location /abvps/ {
        proxy_pass          http://127.0.0.1:8081/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8081/health;
    }
}
EOF

          sudo nginx -t && sudo systemctl restart nginx
          echo "nginx restarted"

      - name: Start ABVPS Backend
        env:
          VPS_USER:        ${{ github.event.inputs.username }}
          PLAN:            ${{ github.event.inputs.plan }}
          TG_BOT_TOKEN:    ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
          DB_PROXY_SECRET: ${{ secrets.DB_PROXY_SECRET }}
          PORT:            8081
        run: |
          nohup node server.js > /tmp/abvps.log 2>&1 &
          sleep 4
          echo "=== server.js boot log ==="
          cat /tmp/abvps.log

      - name: Open tunnel & push link
        env:
          GH_TOKEN:   ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME:   ${{ github.event.inputs.username }}
          TG_TOKEN:   ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT:    ${{ secrets.TG_CHAT_ID }}
          OS_CHOICE:  ${{ github.event.inputs.os }}
        run: |
          cloudflared tunnel --url http://localhost:80 > /tmp/cf_vnc.txt 2>&1 &

          LINK=""
          for i in $(seq 1 50); do
            LINK=$(grep -oP 'https://[a-z0-9\-]+\.trycloudflare\.com' /tmp/cf_vnc.txt 2>/dev/null | head -1)
            [ -n "$LINK" ] && break
            sleep 1
          done

          if [ -z "$LINK" ]; then
            echo "ERROR: No tunnel URL found"
            cat /tmp/cf_vnc.txt
            exit 1
          fi

          echo "Tunnel: $LINK"

          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"
          CONTENT=$(echo -n "$LINK" | base64 -w 0)

          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" "$API_URL")
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || true)

          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'Update tunnel','content':'${CONTENT}','sha':'${SHA}'}))")
          else
            BODY=$(python3 -c "import json; print(json.dumps({'message':'New tunnel','content':'${CONTENT}'}))")
          fi

          curl -s -X PUT "$API_URL" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "User-Agent: ABVPS" \
            -H "Content-Type: application/json" \
            -d "$BODY"

          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TG_CHAT}\",\"text\":\"🖥 <b>${USERNAME}</b> desktop online\\nOS: <code>${OS_CHOICE}</code>\\n${LINK}/guacamole/\",\"parse_mode\":\"HTML\"}" > /dev/null

          echo "Done. Guacamole URL: ${LINK}/guacamole/"

      - name: Wait and Relay Handoff
        env:
          GH_TOKEN:  ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME:  ${{ github.event.inputs.username }}
          OS_CHOICE: ${{ github.event.inputs.os }}
          PLAN:      ${{ github.event.inputs.plan }}
        run: |
          sleep 20700

          if [ "$PLAN" != "free" ]; then
            echo "Relay sequence initiated for paid plan..."
            curl -s -X POST \
              https://api.github.com/repos/AADI-playz23/my-vps/actions/workflows/bugvps.yml/dispatches \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "{\"ref\":\"main\",\"inputs\":{\"username\":\"$USERNAME\",\"os\":\"$OS_CHOICE\",\"plan\":\"$PLAN\"}}"
            sleep 60
          fi

          echo "Session time limit reached."

      - name: Cleanup on exit
        if: always()
        env:
          GH_TOKEN:  ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME:  ${{ github.event.inputs.username }}
          TG_TOKEN:  ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT:   ${{ secrets.TG_CHAT_ID }}
        run: |
          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" "$API_URL")
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])" 2>/dev/null || true)
          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'Clean tunnel','sha':'${SHA}'}))")
            curl -s -X DELETE "$API_URL" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "User-Agent: ABVPS" \
              -H "Content-Type: application/json" \
              -d "$BODY"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TG_CHAT}\",\"text\":\"🔴 <b>${USERNAME}</b> node offline.\",\"parse_mode\":\"HTML\"}" > /dev/null
