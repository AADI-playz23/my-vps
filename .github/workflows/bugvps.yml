name: ABVPS Desktop Node
on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username'
        required: true
        type: string
      os:
        description: 'OS'
        required: true
        default: 'ubuntu'
        type: string
      plan:
        description: 'Plan'
        required: true
        default: 'free'
        type: string
jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm install
        run: npm install ws
      - name: setup desktop
        env:
          OS_CHOICE: ${{ github.event.inputs.os }}
          USERNAME: ${{ github.event.inputs.username }}
        run: |
          mkdir -p /home/runner/abvps-workspace/$USERNAME
          sudo apt-get update -qq
          sudo apt-get install -y nginx x11vnc xvfb novnc websockify xfce4 xfce4-terminal thunar mousepad curl wget netcat-openbsd
          if [ "$OS_CHOICE" = "ubuntu" ]; then sudo apt-get install -y --no-install-recommends firefox; fi
          if [ "$OS_CHOICE" = "kali" ]; then sudo apt-get install -y --no-install-recommends nmap sqlmap hydra john aircrack-ng; fi
          if [ "$OS_CHOICE" = "fedora" ]; then sudo apt-get install -y --no-install-recommends firefox; fi
          if [ "$OS_CHOICE" = "chromeos" ]; then sudo apt-get install -y --no-install-recommends chromium-browser || true; fi

          Xvfb :1 -screen 0 1280x720x24 &
          sleep 2
          DISPLAY=:1 xfce4-session &
          sleep 4
          x11vnc -display :1 -nopw -forever -shared -rfbport 5900 -bg -o /tmp/x11vnc.log
          sleep 2
          websockify --web /usr/share/novnc/ 6080 localhost:5900 &
          sleep 2

          nc -z localhost 5900 && echo "VNC ready" || echo "VNC not ready"
          nc -z localhost 6080 && echo "noVNC ready" || echo "noVNC not ready"

          printf '%s\n' 'server {' '  listen 80;' '  location /novnc/ {' '    proxy_pass http://127.0.0.1:6080/;' '    proxy_http_version 1.1;' '    proxy_set_header Upgrade $http_upgrade;' '    proxy_set_header Connection "upgrade";' '    proxy_set_header Host $host;' '    proxy_read_timeout 3600s;' '  }' '  location = / { return 302 /novnc/vnc.html; }' '  location /abvps/ {' '    proxy_pass http://127.0.0.1:8081/;' '    proxy_http_version 1.1;' '    proxy_set_header Upgrade $http_upgrade;' '    proxy_set_header Connection "upgrade";' '    proxy_set_header Host $host;' '    proxy_read_timeout 3600s;' '  }' '}' | sudo tee /etc/nginx/sites-available/default
          sudo nginx -t && sudo systemctl restart nginx
          echo "nginx ready"

      - name: start backend
        env:
          VPS_USER: ${{ github.event.inputs.username }}
          PLAN: ${{ github.event.inputs.plan }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DB_PROXY_SECRET: ${{ secrets.DB_PROXY_SECRET }}
          PORT: 8081
        run: |
          nohup node server.js > /tmp/abvps.log 2>&1 &
          sleep 4
          cat /tmp/abvps.log

      - name: open tunnel
        env:
          GH_TOKEN: ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME: ${{ github.event.inputs.username }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
          OS_CHOICE: ${{ github.event.inputs.os }}
        run: |
          for i in $(seq 1 30); do
            S=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/ || echo "000")
            if [ "$S" = "200" ] || [ "$S" = "302" ]; then echo "port 80 ready"; break; fi
            sleep 3
          done

          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -R 80:localhost:80 nokey@localhost.run > /tmp/tunnel.txt 2>&1 &

          LINK=""
          for i in $(seq 1 40); do
            LINK=$(grep -oP 'https://[a-zA-Z0-9\-]+\.lhr\.life' /tmp/tunnel.txt 2>/dev/null | head -1 || true)
            [ -n "$LINK" ] && echo "tunnel ready: $LINK" && break
            echo "waiting for tunnel... attempt $i"
            sleep 3
          done

          if [ -z "$LINK" ]; then
            echo "tunnel failed"
            cat /tmp/tunnel.txt
            exit 1
          fi

          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"
          CONTENT=$(echo -n "$LINK" | base64 -w 0)
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" "$API_URL" || true)
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || true)
          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'update','content':'${CONTENT}','sha':'${SHA}'}))")
          else
            BODY=$(python3 -c "import json; print(json.dumps({'message':'new','content':'${CONTENT}'}))")
          fi
          curl -s -X PUT "$API_URL" -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" -H "Content-Type: application/json" -d "$BODY"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" -H "Content-Type: application/json" -d "{\"chat_id\":\"${TG_CHAT}\",\"text\":\"online: ${USERNAME} os: ${OS_CHOICE} ${LINK}/novnc/vnc.html\"}" > /dev/null || true

      - name: wait
        env:
          GH_TOKEN: ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME: ${{ github.event.inputs.username }}
          OS_CHOICE: ${{ github.event.inputs.os }}
          PLAN: ${{ github.event.inputs.plan }}
        run: |
          sleep 20700
          if [ "$PLAN" != "free" ]; then
            curl -s -X POST https://api.github.com/repos/AADI-playz23/my-vps/actions/workflows/bugvps.yml/dispatches -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" -d "{\"ref\":\"main\",\"inputs\":{\"username\":\"$USERNAME\",\"os\":\"$OS_CHOICE\",\"plan\":\"$PLAN\"}}" || true
            sleep 60
          fi

      - name: cleanup
        if: always()
        env:
          GH_TOKEN: ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME: ${{ github.event.inputs.username }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" "$API_URL" || true)
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])" 2>/dev/null || true)
          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'clean','sha':'${SHA}'}))")
            curl -s -X DELETE "$API_URL" -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: ABVPS" -H "Content-Type: application/json" -d "$BODY" || true
          fi
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" -H "Content-Type: application/json" -d "{\"chat_id\":\"${TG_CHAT}\",\"text\":\"offline: ${USERNAME}\"}" > /dev/null || true
