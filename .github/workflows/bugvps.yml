name: BUGVPS Node

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'BugVPS username to launch session for'
        required: true
        type: string

jobs:
  launch-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ws dependency
        run: npm install ws

      - name: Install cloudflared (WebSocket-safe tunnel)
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared --version

      - name: Start BUGVPS WebSocket Server
        env:
          VPS_USER:     ${{ github.event.inputs.username }}
          GH_TOKEN:     ${{ secrets.VPS_DISK_TOKEN }}
          REPO_OWNER:   AADI-playz23
          STORAGE_REPO: vps-disk
          PORT:         8080
        run: |
          nohup node server.js > /tmp/bugvps.log 2>&1 &
          sleep 5
          echo "=== Server boot log ==="
          cat /tmp/bugvps.log

      - name: Open cloudflared tunnel & push link to vps-disk
        env:
          GH_TOKEN:  ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME:  ${{ github.event.inputs.username }}
        run: |
          # Start cloudflared quick tunnel (supports WebSocket natively)
          cloudflared tunnel --url http://localhost:8080 > /tmp/cf_output.txt 2>&1 &
          CF_PID=$!
          echo "Cloudflared PID: $CF_PID"

          # Wait up to 40s for the trycloudflare URL
          LINK=""
          for i in $(seq 1 40); do
            LINK=$(grep -oP 'https://[a-z0-9\-]+\.trycloudflare\.com' /tmp/cf_output.txt 2>/dev/null | head -1)
            [ -n "$LINK" ] && break
            sleep 1
          done

          if [ -z "$LINK" ]; then
            echo "ERROR: No cloudflared URL found"
            cat /tmp/cf_output.txt
            exit 1
          fi
          echo "Tunnel URL: $LINK"

          # Push session link to vps-disk repo
          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"
          CONTENT=$(echo -n "$LINK" | base64 -w 0)

          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: BugVPS-Actions" "$API_URL")
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || true)

          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'Update session for ${USERNAME}','content':'${CONTENT}','sha':'${SHA}'}))")
          else
            BODY=$(python3 -c "import json; print(json.dumps({'message':'New session for ${USERNAME}','content':'${CONTENT}'}))")
          fi

          curl -s -X PUT "$API_URL" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "User-Agent: BugVPS-Actions" \
            -H "Content-Type: application/json" \
            -d "$BODY"
          echo "Session link pushed: $LINK"

      - name: Keep session alive (55 min)
        run: sleep 3300

      - name: Cleanup session link on exit
        if: always()
        env:
          GH_TOKEN:  ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME:  ${{ github.event.inputs.username }}
        run: |
          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: BugVPS-Actions" "$API_URL")
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])" 2>/dev/null || true)
          if [ -n "$SHA" ]; then
            BODY=$(python3 -c "import json; print(json.dumps({'message':'Clean session for ${USERNAME}','sha':'${SHA}'}))")
            curl -s -X DELETE "$API_URL" -H "Authorization: Bearer $GH_TOKEN" -H "User-Agent: BugVPS-Actions" -H "Content-Type: application/json" -d "$BODY"
            echo "Session cleaned."
          fi
