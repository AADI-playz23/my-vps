name: ABVPS Desktop Node

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'ABVPS username'
        required: true
        type: string
      os:
        description: 'OS to install'
        required: true
        default: 'ubuntu'
        type: string
      plan:
        description: 'User plan'
        required: true
        default: 'free'
        type: string

jobs:
  launch-desktop:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install ws

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Setup Zero-Crash Windows Engine
        env:
          OS_CHOICE: ${{ github.event.inputs.os }}
        run: |
          if [ "$OS_CHOICE" = "win10" ] || [ "$OS_CHOICE" = "win11" ]; then
            WIN_VER="tiny11"
            VM_RAM="4G"
            if [ "$OS_CHOICE" = "win10" ]; then 
              WIN_VER="tiny10"
              VM_RAM="3G"
            fi

            # Launch Windows and its built-in web viewer on port 8006!
            docker run -d --name windows_node \
              -e VERSION="$WIN_VER" -e RAM_SIZE="$VM_RAM" -e CPU_CORES="2" \
              -p 8006:8006 --cap-add NET_ADMIN \
              dockurr/windows
            
            echo "VNC_PORT=8006" >> $GITHUB_ENV
          else
            # Fallback for Linux nodes
            sudo apt-get update -qq
            sudo apt-get install -y python3-pip xvfb x11vnc xfce4 xfce4-terminal
            pip3 install websockify --break-system-packages 2>/dev/null || pip install websockify
            git clone https://github.com/novnc/noVNC.git ~/novnc
            
            Xvfb :1 -screen 0 1280x720x24 &
            export DISPLAY=:1
            startxfce4 &
            x11vnc -display :1 -nopw -listen localhost -xkb -ncache 10 -ncache_cr -forever -q &
            websockify --daemon --web ~/novnc 8006 localhost:5900
            
            echo "VNC_PORT=8006" >> $GITHUB_ENV
          fi

      - name: Start ABVPS Backend
        run: |
          nohup node server.js > /tmp/abvps.log 2>&1 &
          sleep 4

      - name: Open tunnel & push link
        env:
          GH_TOKEN:   ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME:   ${{ github.event.inputs.username }}
        run: |
          cloudflared tunnel --url http://localhost:${{ env.VNC_PORT }} > /tmp/cf_vnc.txt 2>&1 &
          sleep 8
          
          LINK=$(grep -oP 'https://[a-z0-9\-]+\.trycloudflare\.com' /tmp/cf_vnc.txt | head -1)
          CONTENT=$(echo -n "$LINK" | base64 -w 0)
          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"
          
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" "$API_URL")
          SHA=$(echo "$RESPONSE" | grep -o '"sha": *"[^"]*"' | cut -d'"' -f4 || true)
          
          if [ -n "$SHA" ]; then
            BODY="{\"message\":\"Update tunnel\",\"content\":\"${CONTENT}\",\"sha\":\"${SHA}\"}"
          else
            BODY="{\"message\":\"New tunnel\",\"content\":\"${CONTENT}\"}"
          fi
          
          curl -s -X PUT "$API_URL" -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" -d "$BODY"

      - name: Wait and Relay
        env:
          GH_TOKEN:  ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME:  ${{ github.event.inputs.username }}
          OS_CHOICE: ${{ github.event.inputs.os }}
          PLAN:      ${{ github.event.inputs.plan }}
        run: |
          sleep 20700
          if [ "$PLAN" != "free" ]; then
            curl -X POST https://api.github.com/repos/AADI-playz23/my-vps/actions/workflows/bugvps.yml/dispatches \
              -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" \
              -d "{\"ref\":\"main\",\"inputs\":{\"username\":\"$USERNAME\",\"os\":\"$OS_CHOICE\",\"plan\":\"$PLAN\"}}"
          fi

      - name: Cleanup on exit
        if: always()
        env:
          GH_TOKEN:  ${{ secrets.VPS_DISK_TOKEN }}
          USERNAME:  ${{ github.event.inputs.username }}
        run: |
          FILE_PATH="tunnel/${USERNAME}.txt"
          API_URL="https://api.github.com/repos/AADI-playz23/vps-disk/contents/${FILE_PATH}"
          RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" "$API_URL")
          SHA=$(echo "$RESPONSE" | grep -o '"sha": *"[^"]*"' | cut -d'"' -f4 || true)
          if [ -n "$SHA" ]; then
            BODY="{\"message\":\"Clean tunnel\",\"sha\":\"${SHA}\"}"
            curl -s -X DELETE "$API_URL" -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" -d "$BODY"
          fi
