name: ABVPS Cloud Engine

on:
  workflow_dispatch:
    inputs:
      username:
        required: true
      os:
        required: true

jobs:
  run-os:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Get Files
        uses: actions/checkout@v4

      - name: Install Tunnel Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl
          curl -sL https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv bore /usr/local/bin/bore

      - name: Start OS
        env:
          OS_CHOICE: ${{ github.event.inputs.os }}
        run: |
          if [ "$OS_CHOICE" == "cli" ]; then
            docker run -d --name os_node -p 80:7681 tsl0922/ttyd bash
            
          elif [ "$OS_CHOICE" == "android" ]; then
            docker run -d --privileged --name os_node -p 80:6080 -e DEVICE="Samsung Galaxy S10" -e WEB_VNC=true budtmo/docker-android:emulator_11.0
            
          elif [ "$OS_CHOICE" == "kali" ]; then
            docker run -d --name os_node -p 80:3000 lscr.io/linuxserver/webtop:kali
            
          elif [ "$OS_CHOICE" == "arch" ]; then
            docker run -d --name os_node -p 80:3000 lscr.io/linuxserver/webtop:arch
            
          elif [ "$OS_CHOICE" == "fedora" ]; then
            docker run -d --name os_node -p 80:3000 lscr.io/linuxserver/webtop:fedora
          fi

      - name: Start Tunnel and Save Link
        env:
          GH_TOKEN: ${{ secrets.VPS_DISK_TOKEN }}
          USER_ID: ${{ github.event.inputs.username }}
        run: |
          nohup bore local 80 --to bore.pub > /tmp/bore.log 2>&1 &
          
          for i in {1..15}; do
            BORE_PORT=$(grep -oP 'listening at bore\.pub:\K[0-9]+' /tmp/bore.log | head -1)
            [ -n "$BORE_PORT" ] && break
            sleep 3
          done

          if [ -z "$BORE_PORT" ]; then exit 1; fi
          FINAL_URL="http://bore.pub:$BORE_PORT"

          FILE_PATH="tunnel/${USER_ID}.txt"
          B64_CONTENT=$(echo -n "$FINAL_URL" | base64 -w 0)
          
          SHA=$(curl -s -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/AADI-playz23/vps-disk/contents/$FILE_PATH" | jq -r '.sha // empty')

          if [ -n "$SHA" ]; then
            JSON_DATA=$(jq -n --arg msg "Update" --arg content "$B64_CONTENT" --arg sha "$SHA" '{message: $msg, content: $content, sha: $sha}')
          else
            JSON_DATA=$(jq -n --arg msg "New" --arg content "$B64_CONTENT" '{message: $msg, content: $content}')
          fi

          curl -s -X PUT "https://api.github.com/repos/AADI-playz23/vps-disk/contents/$FILE_PATH" \
            -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" -d "$JSON_DATA"

      - name: Keep Alive
        run: sleep 21600
